<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbf7"/>
      <stop offset="55%" stop-color="#eaf6ed"/>
      <stop offset="100%" stop-color="#d6efdc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#9adca5" fill-opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- � �p -->
  <g transform="translate(740 360)" opacity="0.95">
    <rect width="440" height="440" rx="48" fill="#ffffff" />
    <g transform="translate(80 80)" fill="#9adca5">
      <rect x="0"   y="0"   width="40" height="40" rx="6"/>
      <rect x="60"  y="0"   width="40" height="40" rx="6"/>
      <rect x="120" y="0"   width="40" height="40" rx="6"/>
      <rect x="0"   y="60"  width="40" height="40" rx="6"/>
      <rect x="180" y="60"  width="40" height="40" rx="6"/>
      <rect x="0"   y="120" width="40" height="40" rx="6"/>
      <rect x="60"  y="120" width="40" height="40" rx="6"/>
      <rect x="120" y="120" width="40" height="40" rx="6"/>
      <rect x="180" y="120" width="40" height="40" rx="6"/>
      <rect x="240" y="120" width="40" height="40" rx="6" fill="#6ec27c"/>
      <rect x="60"  y="180" width="40" height="40" rx="6"/>
      <rect x="180" y="180" width="40" height="40" rx="6"/>
      <rect x="120" y="240" width="40" height="40" rx="6" fill="#6ec27c"/>
    </g>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', system-ui, sans-serif" text-anchor="middle">
    <text x="960" y="900" font-size="56" font-weight="700" fill="#1a1d1b" letter-spacing="-1">amopixel</text>
    <text x="960" y="960" font-size="22" fill="#4a514c">indie game studio � built with love</text>
  </g>
</svg>
