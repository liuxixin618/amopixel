<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />

    <!--
      ============================================================
      与 index.html 的 <base> 保持一致！
      ============================================================
        - 自定义域名根部署 → <base href="/" />
        - GitHub Pages 项目页面 → <base href="/amopixel/" />
    -->
    <base href="/" />

    <title>amopixel</title>
    <style>
      html,
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #4a514c;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-size: 14px;
      }
    </style>

    <!--
      GitHub Pages SPA 重定向：
      把当前真实路径中 BASE 之外的"逻辑路径"暂存到 sessionStorage，
      然后跳到 BASE 根（即 index.html），由 index.html 头部的脚本
      读取并 history.replaceState 还原 URL。用户几乎察觉不到这一跳。
    -->
    <script>
      (function () {
        var baseEl = document.querySelector("base");
        var base = (baseEl && baseEl.getAttribute("href")) || "/";
        if (!base.endsWith("/")) base += "/";
        try {
          var p = location.pathname + location.search + location.hash;
          var logical = p;
          if (base !== "/") {
            var noSlash = base.slice(0, -1);
            if (p === noSlash || p === base) {
              logical = "/";
            } else if (p.startsWith(base)) {
              logical = "/" + p.slice(base.length);
            }
          }
          if (logical && logical !== "/") {
            sessionStorage.setItem("amopixel:redirect", logical);
          }
        } catch (e) {}
        location.replace(base);
      })();
    </script>
  </head>
  <body>
    <p>跳转中… 如未自动跳转，请 <a href=".">点此返回首页</a>。</p>
  </body>
</html>
